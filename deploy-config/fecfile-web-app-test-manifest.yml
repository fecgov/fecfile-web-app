applications:
  - name: fecfile-web-app
    instances: 4
    memory: 1G
    buildpack: nginx_buildpack
    stack: cflinuxfs4
    routes:
      - route: test.fecfile.fec.gov
    env:
      FECFILE_APP_URL: https://test.fecfile.fec.gov/
      FECFILE_API_URL: https://test-api.fecfile.fec.gov
      CDN_STATIC_ASSET_CACHE_LENGTH_SECONDS: 1814400 # 3 weeks
