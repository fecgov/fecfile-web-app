applications:
  - name: fecfile-web-app
    instances: 2
    memory: 1G
    buildpack: nginx_buildpack
    stack: cflinuxfs4
    routes:
      - route: stage.fecfile.fec.gov
    env:
      FECFILE_APP_URL: https://stage.fecfile.fec.gov
      FECFILE_API_URL: https://stage-api.fecfile.fec.gov
      CDN_STATIC_ASSET_CACHE_LENGTH_SECONDS: 1814400 # 3 weeks
