# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1

# See: https://circleci.com/docs/2.0/orb-intro/
orbs:
  browser-tools: circleci/browser-tools@2.4.0
  node: circleci/node@7.2.1
  python: circleci/python@4.0.0
  # Pinned for version tracking and future adoption; current e2e execution
  # still runs manually inside a separate Docker container on the API network.
  cypress: cypress-io/cypress@6.0.0

# Reusable Commands see https://circleci.com/docs/reference/reusing-config/
commands:
  spin-up-api-containers:
    description: "Setup and start fecfile-web-api for E2E tests"
    steps:
      - setup_remote_docker:
          version: docker24
          docker_layer_caching: false
      - run:
          name: clone fecfile-web-api
          command: |
            rm -rf fecfile-web-api
            git clone https://github.com/fecgov/fecfile-web-api.git
          working_directory: ~/project
      - run:
          name: use redis
          command: |
            export MOCK_OPENFEC=REDIS
            echo $MOCK_OPENFEC
      - run:
          name: start fecfile-web-api
          command: |
            git checkout ${CIRCLE_BRANCH}
            docker-compose down
            DB_DOCKERFILE="Dockerfile-e2e" \
            WORKER_DOCKERFILE="Worker_Dockerfile-e2e" \
            API_DOCKERFILE="Dockerfile-e2e" \
            FECFILE_TEST_DB_NAME="postgres" \
            DJANGO_SECRET_KEY=${E2E_DJANGO_SECRET_KEY} \
            DATABASE_URL=${E2E_DATABASE_URL} \
            FEC_API=${E2E_FEC_API} \
            FEC_API_KEY=${E2E_FEC_API_KEY} \
            MOCK_EFO="True" \
            E2E_TEST="True" \
            docker-compose up --build -d

            docker container run --network container:fecfile-api-proxy \
              docker.io/jwilder/dockerize:v0.10.0 \
              -wait http://localhost:8080/devops/status/ \
              -wait-retry-interval 2s \
              -timeout 60s;
          working_directory: ~/project/fecfile-web-api

# See: https://circleci.com/docs/2.0/configuration-reference/#jobs
jobs:
  # Node 24.14.0 is compatible with Angular 20 and keeps CI ready for the
  # separate Angular 21 upgrade ticket and a later Angular 22 move.
  lint:
    docker:
      - image: &node24_browsers_image cimg/node:24.14.0-browsers
    resource_class: large
    steps:
      - checkout
      - node/install-packages:
          override-ci-command: npm install
          app-dir: ~/project/front-end/

      - run:
          name: Print the linter version
          command: ./node_modules/.bin/eslint --version
          working_directory: ~/project/front-end/

      - run:
          name: Run linter
          command: ./node_modules/.bin/eslint "src/**/*.ts" --max-warnings=0
          working_directory: ~/project/front-end/

      - run:
          name: "Run Prettier with project configuration"
          command: npm run prettier:check:ci
          working_directory: ~/project/front-end/
  test:
    # These next lines defines a Docker executors: https://circleci.com/docs/2.0/executor-types/
    # A list of available CircleCI Docker convenience images are available here: https://circleci.com/developer/images/image/cimg/python
    docker:
      - image: *node24_browsers_image
    resource_class: large
    steps:
      - checkout:
          method: full
      - browser-tools/install_chrome:
          replace_existing: true
          chrome_version: "145.0.7632.116"
          channel: stable
      - browser-tools/install_chromedriver
      - run:
          command: |
            google-chrome --version
            chromedriver --version
          name: Check install

      # If we need to modify the params for install-packages:
      # https://circleci.com/developer/orbs/orb/circleci/node#commands-install-packages
      - node/install-packages:
          override-ci-command: npm install
          app-dir: ~/project/front-end/

      - run:
          name: run unit tests
          command: npm run test:ci
          working_directory: ~/project/front-end/

      - store_artifacts:
          path: ~/project/front-end/coverage/front-end/lcov-report/
          destination: coverage-report

      # Sonar cloud setup and scanning
      - run:
          name: Create sonar-scanner cache directory if it does not exist
          command: mkdir -p /tmp/cache/scanner
      - restore_cache:
          keys:
            - v1-sonarcloud-scanner-5.0.1.3006
      - run:
          name: SonarCloud
          command: |
            set -e
            VERSION=5.0.1.3006
            if [ -z "$SONAR_TOKEN" ]; then
                 echo "You must set SONAR_TOKEN environemnt variable"
                 exit 1
            fi
            SCANNER_DIRECTORY=/tmp/cache/scanner
            export SONAR_USER_HOME=$SCANNER_DIRECTORY/.sonar
            OS="linux"
            echo $SONAR_USER_HOME
            if [[ ! -x "$SCANNER_DIRECTORY/sonar-scanner-$VERSION-$OS/bin/sonar-scanner" ]]; then
              curl -Ol https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-$VERSION-$OS.zip
              unzip -qq -o sonar-scanner-cli-$VERSION-$OS.zip -d $SCANNER_DIRECTORY
            fi

            chmod +x $SCANNER_DIRECTORY/sonar-scanner-$VERSION-$OS/bin/sonar-scanner
            chmod +x $SCANNER_DIRECTORY/sonar-scanner-$VERSION-$OS/jre/bin/java
            $SCANNER_DIRECTORY/sonar-scanner-$VERSION-$OS/bin/sonar-scanner
          environment:
            SONARQUBE_SCANNER_PARAMS: '{"sonar.host.url":"https://sonarcloud.io"}'
      - save_cache:
          key: v1-sonarcloud-scanner-5.0.1.3006
          paths:
            - /tmp/cache/scanner

  e2e-smoke:
    docker:
      - image: *node24_browsers_image
    parameters:
      video:
        type: boolean
        default: false
    environment:
      CYPRESS_VIDEO: << parameters.video >>
      CYPRESS_BROWSER_IMAGE: &cypress_browser_image cypress/browsers:node-24.14.0-chrome-145.0.7632.116-1-ff-148.0-edge-145.0.3800.70-1
    steps:
      - spin-up-api-containers
      - run:
          name: execute e2e tests
          command: |
            docker container run --name fecfile-web-app-e2e \
              -e CIRCLE_BRANCH=${CIRCLE_BRANCH} \
              -e CYPRESS_VIDEO=${CYPRESS_VIDEO} \
              -e CYPRESS_EMAIL=${CYPRESS_EMAIL} \
              -e CYPRESS_COMMITTEE_ID=${CYPRESS_COMMITTEE_ID} \
              -e CYPRESS_PASSWORD=${CYPRESS_PASSWORD} \
              -e CYPRESS_FILING_PASSWORD=${CYPRESS_FILING_PASSWORD} \
              --network container:fecfile-api-proxy \
              ${CYPRESS_BROWSER_IMAGE} \
              /bin/bash -c '\
                cd ~; \
                git clone https://github.com/fecgov/fecfile-web-app.git; \
                cd fecfile-web-app/front-end; \
                git checkout ${CIRCLE_BRANCH}; \
                npm install; \
                npm run e2e:smoke:headless;'
      - run:
          name: stage test result artifacts
          when: always
          command: |
            rm -rf /tmp/cypress
            mkdir -p /tmp/cypress/results /tmp/cypress/videos /tmp/cypress/screenshots
            docker cp fecfile-web-app-e2e:/root/fecfile-web-app/front-end/cypress/results/. /tmp/cypress/results || true
            docker cp fecfile-web-app-e2e:/root/fecfile-web-app/front-end/cypress/videos/. /tmp/cypress/videos || true
            docker cp fecfile-web-app-e2e:/root/fecfile-web-app/front-end/cypress/screenshots/. /tmp/cypress/screenshots || true
            docker rm fecfile-web-app-e2e
      - store_artifacts:
          path: /tmp/cypress/results
          destination: cypress/results
      - store_artifacts:
          path: /tmp/cypress/videos
          destination: cypress/videos
      - store_artifacts:
          path: /tmp/cypress/screenshots
          destination: cypress/screenshots
      - store_artifacts:
          path: /tmp/cypress/results/if-5xx
          destination: cypress/results/if-5xx

  # An extended e2e test suite running cypress/e2e-extended/**/*.cy.ts
  e2e-extended:
    docker:
      - image: *node24_browsers_image
    parameters:
      video:
        type: boolean
        default: false
    environment:
      CYPRESS_VIDEO: << parameters.video >>
      CYPRESS_BROWSER_IMAGE: *cypress_browser_image
    steps:
      - spin-up-api-containers
      - run:
          name: execute extended e2e tests
          command: |
            docker container run --name fecfile-web-app-e2e \
              -e CIRCLE_BRANCH=${CIRCLE_BRANCH} \
              -e CYPRESS_VIDEO=${CYPRESS_VIDEO} \
              -e CYPRESS_EMAIL=${CYPRESS_EMAIL} \
              -e CYPRESS_COMMITTEE_ID=${CYPRESS_COMMITTEE_ID} \
              -e CYPRESS_PASSWORD=${CYPRESS_PASSWORD} \
              -e CYPRESS_FILING_PASSWORD=${CYPRESS_FILING_PASSWORD} \
              --network container:fecfile-api-proxy \
              ${CYPRESS_BROWSER_IMAGE} \
              /bin/bash -c '\
                cd ~; \
                git clone https://github.com/fecgov/fecfile-web-app.git; \
                cd fecfile-web-app/front-end; \
                git checkout ${CIRCLE_BRANCH}; \
                npm install; \
                npm run e2e:extended:headless;'
      - run:
          name: stage test result artifacts
          when: always
          command: |
            rm -rf /tmp/cypress
            mkdir -p /tmp/cypress/results /tmp/cypress/videos /tmp/cypress/screenshots
            docker cp fecfile-web-app-e2e:/root/fecfile-web-app/front-end/cypress/results/. /tmp/cypress/results || true
            docker cp fecfile-web-app-e2e:/root/fecfile-web-app/front-end/cypress/videos/. /tmp/cypress/videos || true
            docker cp fecfile-web-app-e2e:/root/fecfile-web-app/front-end/cypress/screenshots/. /tmp/cypress/screenshots || true
            docker rm fecfile-web-app-e2e
      - store_artifacts:
          path: /tmp/cypress/results
          destination: cypress/results
      - store_artifacts:
          path: /tmp/cypress/videos
          destination: cypress/videos
      - store_artifacts:
          path: /tmp/cypress/screenshots
          destination: cypress/screenshots
      - store_artifacts:
          path: /tmp/cypress/results/if-5xx
          destination: cypress/results/if-5xx

  deploy-job:
    docker:
      - image: &python313_image cimg/python:3.13.12
    resource_class: large
    steps:
      - checkout

      - python/install-packages:
          pkg-manager: pip
          app-dir: ~/project/
          pip-dependency-file: requirements.txt

      - run:
          name: Install cf cli
          command: |
            mkdir -p $HOME/bin
            export PATH=$HOME/bin:$PATH
            curl -L "https://cli.run.pivotal.io/stable?release=linux64-binary&version=8.12.0" | tar xzv -C $HOME/bin

      - run:
          name: run deploy script
          no_output_timeout: 15m
          command: |
            export PATH=$HOME/bin:$PATH
            invoke deploy --branch $CIRCLE_BRANCH --login

  dependency-check:
    docker:
      - image: *python313_image

    steps:
      - checkout
      - node/install:
          node-version: "24.14.0"

      # If we need to modify the params for install-packages:
      # https://circleci.com/developer/orbs/orb/circleci/node#commands-install-packages
      - node/install-packages:
          override-ci-command: npm install
          app-dir: ~/project/front-end/
      - run:
          name: List installed node dependencies
          command: npm ls --all
          working_directory: ~/project/front-end/
      - python/install-packages:
          pkg-manager: pip
          pip-dependency-file: requirements.txt
      - run:
          name: Check for unused dependencies
          command: npx knip
          working_directory: ~/project/front-end/

# Invoke jobs via workflows
# See: https://circleci.com/docs/2.0/configuration-reference/#workflows
parameters:
  is-triggered-e2e-smoke-test:
    type: boolean
    default: false

  is-triggered-e2e-extended-test:
    type: boolean
    default: false

  is-triggered-unit-test:
    type: boolean
    default: false

  is-triggered-full-nightly:
    type: boolean
    default: false

  e2e-video:
    type: boolean
    default: false

workflows:
  primary:
    when:
      and:
        - not: << pipeline.parameters.is-triggered-e2e-smoke-test >>
        - not: << pipeline.parameters.is-triggered-e2e-extended-test >>
        - not: << pipeline.parameters.is-triggered-unit-test >>
        - not: << pipeline.parameters.is-triggered-full-nightly >>
    jobs:
      - lint
      - test
      - dependency-check
      - e2e-smoke:
          video: << pipeline.parameters.e2e-video >> # Default is false
          filters:
            branches:
              only: /develop|release\/sprint-[\.\d]+|release\/test|main/
      - deploy-job: # Deploy job even when e2e tests fail
          name: deploy-even-if-e2e-job-fails
          requires:
            - lint
            - test
            - dependency-check
          filters:
            branches:
              only: /develop|release\/sprint-[\.\d]+|release\/test|main/

  # This job is run when an e2e test is triggered with the
  # is-triggered-e2e-test parameter via the fecfile-web-api
  # circleci config file.  It is used to run the e2e tests
  # when the fecfile-web-api is deployed to dev, stage,
  # test, or prod.
  triggered-e2e-smoke-test:
    when: << pipeline.parameters.is-triggered-e2e-smoke-test >>
    jobs:
      - e2e-smoke:
          video: << pipeline.parameters.e2e-video >>

  triggered-extended-e2e-test:
    when: << pipeline.parameters.is-triggered-e2e-extended-test >>
    jobs:
      - e2e-extended:
          video: << pipeline.parameters.e2e-video >>

  triggered-unit-test:
    when: << pipeline.parameters.is-triggered-unit-test >>
    jobs:
      - test

  full-nightly:
    when: << pipeline.parameters.is-triggered-full-nightly >>
    jobs:
      - e2e-smoke:
          video: true
      - e2e-extended:
          video: true
      - test
