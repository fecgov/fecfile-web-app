<div class="field date-picker-field">
  <span class="span-label" id="date_picker_label" [innerHTML]="label()"></span>
  <p-datepicker
    #datepicker
    appendTo="body"
    (onFocus)="calendarOpened = true"
    (onClose)="validateDate(false)"
    (onBlur)="validateDate(calendarOpened)"
    [inputId]="fieldName()"
    [name]="fieldName()"
    [formControl]="control()!"
    [attr.data-cy]="fieldName()"
    [showIcon]="true"
    [iconDisplay]="'input'"
    ariaLabelledBy="date_picker_label"
    [keepInvalid]="true"
    [autoClear]="false"
    placeholder="MM/DD/YYYY"
    pInputMask="99/99/9999"
    slotChar="MM/DD/YYYY"
    dataType="string"
  >
    <ng-template pTemplate="header">
      <div class="flex justify-content-between p-2 border-bottom-1 border-300">
        <div class="flex gap-1">
          @if (datepicker.currentView === 'date') {
            <button class="year-button" (click)="onYearChange($event, -1)">
              <svg height="14" width="20">
                <use href="assets/img/prev-year-arrow.svg"></use>
              </svg>
            </button>
          }
          <button class="month-button" (click)="datepicker.onPrevButtonClick($event)">
            <svg height="14" width="14">
              <use href="assets/img/prev-month-arrow.svg"></use>
            </svg>
          </button>
        </div>
        <div class="flex gap-2">
          @if (datepicker.currentView === 'date') {
            <button
              type="button"
              class="outlined-button"
              (click)="datepicker.switchToMonthView($event)"
              (keydown)="datepicker.onContainerButtonKeydown($event)"
              [attr.disabled]="datepicker.switchViewButtonDisabled() ? '' : undefined"
              [attr.aria-label]="datepicker.getTranslation('chooseMonth')"
              [attr.data-pc-group-section]="'navigator'"
              pRipple
            >
              {{ datepicker.getMonthName(datepicker.currentMonth) }}
            </button>
          }
          @if (datepicker.currentView !== 'year') {
            <button
              type="button"
              class="outlined-button"
              (click)="datepicker.switchToYearView($event)"
              (keydown)="datepicker.onContainerButtonKeydown($event)"
              [attr.disabled]="datepicker.switchViewButtonDisabled() ? '' : undefined"
              [attr.aria-label]="datepicker.getTranslation('chooseYear')"
              [attr.data-pc-group-section]="'navigator'"
              pRipple
            >
              {{ datepicker.currentYear }}
            </button>
          }
        </div>
        <div class="flex gap-1">
          <button class="month-button" (click)="datepicker.onNextButtonClick($event)">
            <svg height="14" width="14" class="rotate-180">
              <use href="assets/img/prev-month-arrow.svg"></use>
            </svg>
          </button>
          @if (datepicker.currentView === 'date') {
            <button class="year-button" (click)="onYearChange($event, 1)">
              <svg height="14" width="20" class="rotate-180">
                <use href="assets/img/prev-year-arrow.svg"></use>
              </svg>
            </button>
          }
        </div>
      </div>
    </ng-template>
    <ng-template #inputicon let-clickCallBack="clickCallBack">
      <div
        class="calendar-icon-mask"
        aria-label="Calendar"
        (click)="clickCallBack($event)"
        (keypress)="clickCallBack($event)"
      ></div>
    </ng-template>
  </p-datepicker>
  @if (control() && showErrors()) {
    <app-error-messages
      [attr.data-cy]="fieldName() + '-error'"
      [form]="form()"
      [control]="control()"
      [formSubmitted]="formSubmitted()"
      [requiredErrorMessage]="requiredErrorMessage()"
      [patternErrorMessage]="invalidFormatMessage()"
    />
  }
</div>
