<fieldset [formGroup]="form">
  <legend></legend>
  <div class="grid" data-cy="support_oppose_code">
    <div class="col-2 flex radio-wrapper">
      <p-radioButton
        name="support_oppose_code"
        inputId="support"
        value="S"
        formControlName="support_oppose_code"
        ariaLabel="support candidate"
      />
      <label for="support" class="ml-2">SUPPORT</label>
    </div>
    <div class="col-2 flex radio-wrapper">
      <p-radioButton
        inputId="oppose"
        name="support_oppose_code"
        value="O"
        formControlName="support_oppose_code"
        ariaLabel="oppose candidate"
      />
      <label for="oppose" class="ml-2">OPPOSE</label>
    </div>
  </div>
  <div class="grid">
    <div class="col-12">
      <app-error-messages
        [form]="form"
        fieldName="support_oppose_code"
        [formSubmitted]="formSubmitted"
        patternErrorMessage="An answer is required"
      />
    </div>
  </div>
</fieldset>
