<form id="form" [formGroup]="form" [attr.data-cy]="contextDataCy('linked-report', 'form')">
  <div class="field" [attr.data-cy]="fieldDataCy('linkedF3x', 'field')">
    <label for="linkedF3x" class="flex">
      <span class="align-content-center">LINKED REPORT</span>
      <span
        class="pi pi-info-circle circle-icon-tooltip"
        pTooltip="{{ tooltipText }}"
        [tooltipOptions]="{
          tooltipPosition: 'top',
        }"
      ></span>
    </label>

    <input
      type="text"
      [readonly]="true"
      class="readonly w-30rem"
      pInputText
      id="linkedF3x"
      formControlName="linkedF3x"
      [attr.data-cy]="fieldDataCy('linkedF3x')"
    />
    <app-error-messages
      [form]="form"
      fieldName="linkedF3x"
      [formSubmitted]="formSubmitted"
      [dataCyContext]="dataCyContext"
    />
  </div>
</form>
