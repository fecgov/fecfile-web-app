<fieldset [formGroup]="form">
  <legend>
    {{ label() }}
    @if (parenLabel()) {
      <span class="paren-label">{{ parenLabel() }}</span>
    }
  </legend>
  @if (tooltipText()) {
    <span class="icon i-info-circle circle-icon-tooltip" pTooltip="{{ tooltipText() }}" [escape]="tooltipEscape"></span>
  }

  <div class="grid">
    <div class="col-1 flex">
      <p-radioButton
        [name]="controlName()"
        [inputId]="controlName() + '-N'"
        [value]="false"
        [formControlName]="controlName()"
        [ariaLabel]="ariaLabelNo()"
        [class]="radioClass()"
      />
      <label [for]="controlName() + '-N'" class="ml-2">NO</label>
    </div>
    <div class="col-1 flex">
      <p-radioButton
        [name]="controlName()"
        [inputId]="controlName() + '-Y'"
        [value]="true"
        [formControlName]="controlName()"
        [ariaLabel]="ariaLabelYes()"
        [class]="radioClass()"
      />
      <label [for]="controlName() + '-Y'" class="ml-2">YES</label>
    </div>
  </div>
  <div class="grid">
    <div class="col-12">
      <app-error-messages
        [form]="form"
        [fieldName]="controlName()"
        [formSubmitted]="formSubmitted"
        [patternErrorMessage]="errorMessage()"
      />
    </div>
  </div>
</fieldset>
