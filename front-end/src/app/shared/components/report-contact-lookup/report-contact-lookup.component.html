<div class="flex" [attr.data-cy]="rootDataCy()">

  <div class="add-contact-container">
    or
    <span
      tabindex="0"
      (click)="openDialog()"
      (keydown.enter)="openDialog()"
      (keydown.space)="openDialog()"

    </span>
  </div>
</div>
