<app-dialog
  tabindex="-1"
  aria-labelledby="dialog-title"
  [title]="member() ? 'Edit Role' : 'Add user'"
  [submitLabel]="member() ? 'Change' : 'Add'"
  [(visible)]="detailVisible"
  [submitDisabled]="submitDisabled"
  (confirm)="submitForm()"
>
  <form id="form" [formGroup]="form" [class.ng-submitted]="formSubmitted">
    <div class="dialog-body">
      @if (member()) {
        <div class="field">
          <label class="dialog-label" id="role-label" for="role">CURRENT ROLE</label>
          <input id="role" [disabled]="true" [value]="role()" />
        </div>
      } @else {
        <div class="field">
          <label class="dialog-label" for="email">EMAIL</label>
          <input autofocus type="text" pInputText id="email" formControlName="email" />
          <app-error-messages [form]="form" fieldName="email" [formSubmitted]="form.controls['email'].touched" />
        </div>
      }
      <app-select
        inputId="role"
        label="ROLE"
        [options]="availableRoleOptions()"
        [form]="form"
        formControlName="role"
        labelClass="dialog-label"
      />
    </div>
  </form>
</app-dialog>
