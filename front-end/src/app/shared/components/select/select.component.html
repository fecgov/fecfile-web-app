<div class="field">
  <label [class]="labelClass()" [id]="labelId()" [for]="safeId()">{{ label() }}</label>
  <select [formControl]="control()" [id]="safeId()" (change)="updateBlur($event)">
    <button [attr.aria-labelledby]="labelId()">
      <selectedcontent></selectedcontent>
    </button>
    @for (option of options(); track option.value) {
      <option [value]="option.value">{{ option.label }}</option>
    }
  </select>
  @if (includeErrorMessages()) {
    <app-error-messages [form]="form()" [fieldName]="formControlName()" [formSubmitted]="formSubmitted()" />
  }
</div>
