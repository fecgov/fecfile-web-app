<div class="field">
  <label [class]="labelClass()" [id]="selectId().label" [for]="selectId().id">
    {{ label() }}
    @if (optionalLabel()) {
      <span class="paren-label">(OPTIONAL)</span>
    }
  </label>
  <div class="select-wrapper">
    <select
      #selectElement
      [formControl]="control()"
      [id]="selectId().id"
      [attr.data-cy]="selectDataCy()"
      (change)="handleChange()"
      [disabled]="control().disabled"
      (blur)="update.emit(control().value)"
    >
      <button [attr.aria-labelledby]="selectId().label">
        <selectedcontent #selected></selectedcontent>
      </button>
      @for (option of options(); track option.value) {
        <option [ngValue]="option.value">
          @if (customTemplate()) {
            <ng-container *ngTemplateOutlet="customTemplate(); context: { $implicit: option }"></ng-container>
          } @else {
            {{ option.label }}
          }
        </option>
      }
    </select>
    @if (showClear() && control().value && !control().disabled) {
      <button
        type="button"
        class="select-clear-button"
        aria-label="Clear selection"
        [attr.data-cy]="clearButtonDataCy()"
        (click)="clear($event)"
      >
        <i class="pi pi-times"></i>
      </button>
    }
  </div>
  @if (includeErrorMessages()) {
    <app-error-messages
      [form]="form()"
      [fieldName]="formControlName()"
      [formSubmitted]="formSubmitted()"
      [dataCyContext]="dataCyContext()"
    />
  }
</div>
