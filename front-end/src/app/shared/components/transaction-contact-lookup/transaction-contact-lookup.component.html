<div class="p-fluid" [attr.data-cy]="dataCyContext + '-panel'">
  <div
    [class.transaction-contact-invalid]="errorMessageFormControl?.status === 'INVALID'"
    [attr.data-cy]="dataCyContext + '-lookup-field'"
  >
    <app-contact-lookup
      [attr.data-cy]="dataCyContext + '-lookup-panel'"
      [contactTypeOptions]="contactTypeOptions"
      [candidateOffice]="mandatoryCandidateOffice"
      [dataCyContext]="dataCyContext"
      (contactTypeSelect)="contactTypeSelected($event)"
      (contactLookupSelect)="contactLookupSelected($event)"
      (createNewContactSelect)="createNewContactSelected()"
    >
    </app-contact-lookup>
  </div>
  <app-contact-dialog
    headerTitle="Create a new contact"
    [attr.data-cy]="dataCyContext + '-dialog'"
    [contactTypeOptions]="dialogContactTypeOptions"
    [defaultCandidateOffice]="mandatoryCandidateOffice"
    [dataCyContext]="dataCyContext"
    [(detailVisible)]="detailVisible"
    (savedContact)="saveContact($event)"
  />
</div>
@if (errorMessageFormControl) {
  <app-error-messages
    [control]="errorMessageFormControl"
    [formSubmitted]="formSubmitted"
    [requiredErrorMessage]="currentContactLabel + ' information is required'"
    [dataCyContext]="dataCyContext"
  />
}
