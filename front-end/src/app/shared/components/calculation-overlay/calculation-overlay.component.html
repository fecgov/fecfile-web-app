<div class="calculation-icon" data-cy="shared-calculation-overlay">
  <p-popover #op data-cy="shared-calculation-overlay-popover">
    <ng-content></ng-content>
  </p-popover>
  <img
    src="/assets/img/calculation-icon.svg"
    role="img"
    alt=""
    aria-hidden="true"
    data-cy="shared-calculation-overlay-trigger-button"
    (click)="op.toggle($event)"
    (keyup.enter)="op.toggle($event)"
    tabindex="0"
  />
</div>
