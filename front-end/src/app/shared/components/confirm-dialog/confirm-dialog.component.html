<app-dialog
  [(visible)]="visible"
  data-cy="layout-confirm-dialog"
  dataCyContext="layout-confirm"
  [title]="header()"
  submitLabel="Confirm"
  (confirm)="confirmOption()"
  (close)="cancelOption()"
>
  <p data-cy="layout-confirm-dialog-message">
    <span data-cy="layout-confirm-dialog-message-text">{{ message() }}</span>
  </p>
</app-dialog>
