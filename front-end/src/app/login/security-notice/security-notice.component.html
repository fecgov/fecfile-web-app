@if (showForm) {
  <div class="flex justify-content-between align-items-center">
    <img
      id="fec-seal-and-title"
      alt="FECfile+ Seal and Title"
      src="/assets/img/seal-and-title-white.svg"
      height="64"
      width="247"
    />

    <a class="logout-button" (click)="loginService.logOut()">
      <span>Log Out</span>
    </a>
  </div>
}

<div [class.security-container]="showForm" [class.standard-container]="showForm" [class.notice-box]="!showForm">
  <div class="header">
    <h1>Terms of service and user agreement</h1>
  </div>
  <div [class.notice-box-form]="showForm">
    <ng-container *ngComponentOutlet="componentToLoad"></ng-container>
  </div>

  @if (showForm) {
    <div class="footer">
      <hr type="solid" />
      <form [formGroup]="form">
        <div class="field-row">
          <p-checkbox
            formControlName="security-consent-annual"
            [binary]="true"
            inputId="security-consent-annual"
            ariaLabel="You consent to the security notification for one year"
          />
          <label for="security-consent-annual" class="p-checkbox-label">
            You consent to the security notification for one year
          </label>
        </div>
      </form>
      <div class="flex justify-content-center gap-6">
        <p-button
          [pt]="{ root: 'security-button' }"
          severity="secondary"
          label="Decline and exit"
          (click)="loginService.logOut()"
          (keypress)="loginService.logOut()"
        />
        <p-button
          [pt]="{ root: 'security-button' }"
          data-cy="consent-button"
          label="Consent"
          (click)="signConsentForm()"
          (keypress)="signConsentForm()"
        />
      </div>
    </div>

    <div class="consent-box"></div>
  }
</div>
