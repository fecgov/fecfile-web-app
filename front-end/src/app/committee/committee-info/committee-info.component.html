<h1 data-cy="committee-info-page-title">Account information</h1>
<hr type="solid" />
<form id="form" p-disabled [formGroup]="form" data-cy="committee-info-page-form">
  <div class="grid">
    <div class="col-12">
      <h2 data-cy="committee-info-page-committee-title">Committee</h2>
    </div>
  </div>
  <div class="grid">
    <div class="col-9">
      <div class="field" data-cy="committee-info-page-name-field">
        <label for="name">COMMITTEE NAME</label>
        <input class="p-disabled" type="text" pInputText id="name" formControlName="name" data-cy="committee-info-page-name-input" />
      </div>
    </div>
    <div class="col-3">
      <div class="field" data-cy="committee-info-page-committee-id-field">
        <label for="committee_id">COMMITTEE ID</label>
        <input
          class="p-disabled"
          type="text"
          pInputText
          id="committee_id"
          formControlName="committee_id"
          data-cy="committee-info-page-committee-id-input"
        />
      </div>
    </div>
  </div>
  <div class="grid">
    <div class="col-6">
      <div class="field" data-cy="committee-info-page-committee-type-field">
        <label for="committee_type_label">TYPE OF COMMITTEE</label>
        <input
          class="p-disabled"
          type="text"
          pInputText
          id="committee_type_label"
          formControlName="committee_type_label"
          data-cy="committee-info-page-committee-type-input"
        />
      </div>
    </div>
  </div>
  <hr type="solid" />
  <div class="grid">
    <div class="col-12">
      <h2 data-cy="committee-info-page-address-title">Address</h2>
    </div>
  </div>
  <div class="grid">
    <div class="col-6">
      <div class="field" data-cy="committee-info-page-street-1-field">
        <label for="street_1">STREET ADDRESS</label>
        <input class="p-disabled" type="text" pInputText id="street_1" formControlName="street_1" data-cy="committee-info-page-street-1-input" />
      </div>
    </div>
    <div class="col-6">
      <div class="field" data-cy="committee-info-page-street-2-field">
        <label for="street_2">APARTMENT, SUITE, ETC.</label>
        <input class="p-disabled" type="text" pInputText id="street_2" formControlName="street_2" data-cy="committee-info-page-street-2-input" />
      </div>
    </div>
  </div>
  <div class="grid">
    <div class="col-6">
      <div class="field" data-cy="committee-info-page-city-field">
        <label for="city">CITY</label>
        <input class="p-disabled" type="text" pInputText id="city" formControlName="city" data-cy="committee-info-page-city-input" />
      </div>
    </div>
    <div class="col-3">
      <app-select
        inputId="state"
        label="STATE/TERRITORY"
        [options]="stateOptions"
        [form]="form"
        formControlName="state"
        dataCyContext="committee-info-page"
      />
    </div>
    <div class="col-3">
      <div class="field" data-cy="committee-info-page-zip-field">
        <label for="zip">ZIP/POSTAL CODE</label>
        <input class="p-disabled" type="text" pInputText id="zip" formControlName="zip" data-cy="committee-info-page-zip-input" />
      </div>
    </div>
  </div>
  <div class="grid">
    <div class="col-6 long-word-value">
      <div class="field" data-cy="committee-info-page-email-field">
        <label for="email">EMAIL</label>
        <input class="p-disabled" type="text" pInputText id="email" formControlName="email" data-cy="committee-info-page-email-input" />
      </div>
    </div>
    <div class="col-6 long-word-value">
      <div class="field" data-cy="committee-info-page-website-field">
        <label for="website">WEBSITE</label>
        <input class="p-disabled" type="text" pInputText id="website" formControlName="website" data-cy="committee-info-page-website-input" />
      </div>
    </div>
  </div>
  <hr type="solid" />
  <div class="grid">
    <div class="col-12">
      <h2 data-cy="committee-info-page-treasurer-title">Treasurer</h2>
    </div>
  </div>
  <div class="grid">
    <div class="col-6">
      <div class="field" data-cy="committee-info-page-treasurer-last-name-field">
        <label for="treasurer_name_2">LAST NAME</label>
        <input
          class="p-disabled"
          type="text"
          pInputText
          id="treasurer_name_2"
          formControlName="treasurer_name_2"
          data-cy="committee-info-page-treasurer-last-name-input"
        />
      </div>
    </div>
    <div class="col-6">
      <div class="field" data-cy="committee-info-page-treasurer-first-name-field">
        <label for="treasurer_name_1">FIRST NAME</label>
        <input
          class="p-disabled"
          type="text"
          pInputText
          id="treasurer_name_1"
          formControlName="treasurer_name_1"
          data-cy="committee-info-page-treasurer-first-name-input"
        />
      </div>
    </div>
  </div>
  <div class="grid">
    <div class="col-6">
      <div class="field" data-cy="committee-info-page-treasurer-street-1-field">
        <label for="treasurer_street_1">STREET ADDRESS</label>
        <input
          class="p-disabled"
          type="text"
          pInputText
          id="treasurer_street_1"
          formControlName="treasurer_street_1"
          data-cy="committee-info-page-treasurer-street-1-input"
        />
      </div>
    </div>
    <div class="col-6">
      <div class="field" data-cy="committee-info-page-treasurer-street-2-field">
        <label for="treasurer_street_2">APARTMENT, SUITE, ETC.</label>
        <input
          class="p-disabled"
          type="text"
          pInputText
          id="treasurer_street_2"
          formControlName="treasurer_street_2"
          data-cy="committee-info-page-treasurer-street-2-input"
        />
      </div>
    </div>
  </div>
  <div class="grid">
    <div class="col-6">
      <div class="field" data-cy="committee-info-page-treasurer-city-field">
        <label for="treasurer_city">CITY</label>
        <input
          class="p-disabled"
          type="text"
          pInputText
          id="treasurer_city"
          formControlName="treasurer_city"
          data-cy="committee-info-page-treasurer-city-input"
        />
      </div>
    </div>
    <div class="col-3">
      <app-select
        inputId="treasurer_state"
        label="STATE/TERRITORY"
        [options]="stateOptions"
        [form]="form"
        formControlName="treasurer_state"
        dataCyContext="committee-info-page"
      />
    </div>
    <div class="col-3">
      <div class="field" data-cy="committee-info-page-treasurer-zip-field">
        <label for="treasurer_zip">ZIP/POSTAL CODE</label>
        <input
          class="p-disabled"
          type="text"
          pInputText
          id="treasurer_zip"
          formControlName="treasurer_zip"
          data-cy="committee-info-page-treasurer-zip-input"
        />
      </div>
    </div>
  </div>
  <div class="grid">
    <div class="col-3">
      <div class="field" data-cy="committee-info-page-treasurer-phone-field">
        <label id="telephone-label" for="treasurer_phone">TELEPHONE</label>
        <app-fec-international-phone-input
          [disabled]="true"
          inputId="treasurer_phone"
          formControlName="treasurer_phone"
          labelName="telephone-label"
          dataCyContext="committee-info-page"
        >
        </app-fec-international-phone-input>
      </div>
    </div>
  </div>
  <hr type="solid" />
  <div class="grid">
    <div class="col-12">
      <h2 data-cy="committee-info-page-custodian-title">Custodian</h2>
    </div>
  </div>
  <div class="grid">
    <div class="col-3">
      <div class="field" data-cy="committee-info-page-custodian-name-field">
        <label for="custodian_name_full">CUSTODIAN OF RECORDS</label>
        <input
          class="p-disabled"
          type="text"
          pInputText
          id="custodian_name_full"
          formControlName="custodian_name_full"
          data-cy="committee-info-page-custodian-name-input"
        />
      </div>
    </div>
  </div>
  <hr type="solid" />
  <div class="committee-info-footer grid" data-cy="committee-info-page-footer">
    <div class="col-12">
      <p class="text-center" data-cy="committee-info-page-read-only-message">
        You can only view your committee's information on this page.
      </p>
    </div>
    <div class="col-12">
      <div class="px-2">
        <button
          pButton
          label="View full committee info from Form 1"
          class="p-button-secondary"
          data-cy="committee-info-page-view-form-1-button"
          (click)="viewForm1()"
        ></button>
      </div>
      <div class="px-2">
        <button
          pButton
          id="update-form-1-link"
          label="Update committee info using Form 1"
          class="p-button-primary"
          data-cy="committee-info-page-update-form-1-button"
          (click)="updateForm1()"
        ></button>
      </div>
    </div>
  </div>
</form>
