<ng-template #nameBody let-item>
  <a (click)="editItem(item)" [attr.data-cy]="'transactions-guarantors-table-row-' + item.id + '-name-link'">
    {{ item.name }}
  </a>
</ng-template>

<ng-template #actionsBody let-item>
  <app-table-actions-button
    [tableActions]="rowActions"
    [actionItem]="item"
    (tableActionClick)="onRowActionClick($event.action, $event.actionItem)"
    buttonIcon="pi pi-ellipsis-v"
    buttonStyleClass="p-button-text"
    buttonAriaLabel="action"
    dataCyContext="transactions-guarantors-table"
  />
</ng-template>

<app-table
  [(first)]="first"
  title="Guarantors"
  [items]="items()"
  [(totalItems)]="totalItems"
  [loading]="loading()"
  [(rowsPerPage)]="rowsPerPage"
  [(selectedItems)]="selectedItems"
  [currentPageReportTemplate]="'Showing {first} to {last} of {totalRecords} Guarantors'"
  sortField="name"
  [columns]="columns()"
  dataCyContext="transactions-guarantors"
>
</app-table>

<p-confirmDialog
  #deleteDialog
  [style]="{ width: '450px' }"
  key="transaction-deletion-dialog"
  header="Are you sure?"
  data-cy="transactions-guarantors-delete-dialog"
>
  <ng-template pTemplate="footer">
    <span class="confirm-footer" data-cy="transactions-guarantors-delete-dialog-footer">
      <button
        type="button"
        pButton
        class="p-button-secondary"
        label="Cancel"
        data-cy="transactions-guarantors-delete-dialog-cancel-button"
        (click)="deleteDialog.onReject()"
      ></button>
      <button
        type="button"
        pButton
        label="Confirm"
        data-cy="transactions-guarantors-delete-dialog-confirm-button"
        (click)="deleteDialog.onAccept()"
      ></button>
    </span>
  </ng-template>
</p-confirmDialog>
