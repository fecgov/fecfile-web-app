<dialog #selectReportDialog (close)="cancel()" data-cy="transactions-select-report-dialog">
  <div tabindex="-1" aria-labelledby="dialog-title" aria-hidden="true">
    <div class="dialog-content">
      <div class="dialog-header">
        <h1 class="dialog-title" id="dialog-title" data-cy="transactions-select-report-dialog-title">Select a report</h1>
        <button
          pButton
          type="button"
          icon="pi pi-times"
          id="close-button"
          (click)="cancel()"
          aria-label="Cancel"
          data-cy="transactions-select-report-dialog-close-button"
        ></button>
      </div>
      <div class="dialog-body">
        <p>
          Pick the open report on which you would like to {{ actionLabel() }} a contribution or a portion of it to a
          different {{ actionTargetLabel() }}.
        </p>
        <label id="report-selector-label" for="report-selector">OPEN REPORTS</label>
        <select id="report-selector" aria-label="Report selector" [(ngModel)]="selectedReport" data-cy="transactions-select-report-dialog-report-select">
          <button aria-labelledby="report-selector-label">
            <selectedcontent></selectedcontent>
          </button>
          @for (report of availableReports(); track report) {
            <option [ngValue]="report">{{ report.formLabel }}: {{ report.report_code_label }}</option>
          }
        </select>
      </div>
      <div class="dialog-footer">
        <button pButton pRipple class="p-button-secondary" (click)="selectReportDialog.close()" data-cy="transactions-select-report-dialog-cancel-button">Cancel</button>
        <button
          pButton
          pRipple
          class="p-button-primary"
          [disabled]="!selectedReport"
          (click)="createReattribution()"
          label="Continue"
          data-cy="transactions-select-report-dialog-continue-button"
        ></button>
      </div>
    </div>
  </div>
</dialog>
