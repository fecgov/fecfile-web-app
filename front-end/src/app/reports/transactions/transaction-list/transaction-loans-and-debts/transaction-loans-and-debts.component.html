<ng-template #typeBody let-item>
  <a [routerLink]="[item?.id]" [attr.data-cy]="'transactions-loans-debts-table-row-' + item.id + '-type-link'">
    {{ item.transaction_type_identifier | label: scheduleTransactionTypeLabels }}
  </a>

  @if (!item?.itemized) {
    <div [attr.data-cy]="'transactions-loans-debts-table-row-' + item.id + '-unitemized'"><strong>Unitemized</strong></div>
  }
</ng-template>

<ng-template #actionsBody let-item>
  <app-table-actions-button
    [tableActions]="rowActions"
    [actionItem]="item"
    dataCyContext="transactions-loans-debts-table"
    (tableActionClick)="onRowActionClick($event.action, $event.actionItem)"
    buttonIcon="pi pi-ellipsis-v"
    buttonStyleClass="p-button-text"
    buttonAriaLabel="action"
    dataTest="loans-and-debts-button"
  />
</ng-template>

<app-table
  [(first)]="first"
  [(selectedItems)]="selectedItems"
  data-cy="transactions-loans-debts-table"
  dataCyContext="transactions-loans-debts"
  itemName="transactions"
  title="Loans and Debts"
  [items]="items()"
  [(totalItems)]="totalItems"
  [loading]="loading()"
  sortField="line_label,created"
  [(rowsPerPage)]="rowsPerPage"
  [columns]="columns()"
>
</app-table>
