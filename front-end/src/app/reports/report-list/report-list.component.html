<p-toolbar>
  <ng-template #start>
    <h1 class="m-0">Manage reports</h1>
  </ng-template>
  <ng-template #end>
    <button
      pButton
      pRipple
      label="Create report"
      data-cy="create-report"
      icon="pi pi-plus"
      class="add-button"
      (click)="dialogVisible.set(true)"
    ></button>
  </ng-template>
</p-toolbar>
<hr class="mb-0" />

@if (showEmptyState()) {
  <div class="empty-state">
    <img src="assets/img/searching_image.png" alt="No reports created" />
    <span class="empty-state-text">No reports yet. Create your first report!</span>
  </div>
  <hr type="solid" class="mb-0 mt-0" />
}

<app-form3x-list (loaded)="tableLoadedStates.form3x.set(true)" />
@if (showForm3) {
  <app-form3-list (loaded)="tableLoadedStates.form3.set(true)" />
}
<app-form24-list (loaded)="tableLoadedStates.form24.set(true)" />
<app-form1m-list (loaded)="tableLoadedStates.form1m.set(true)" />
<app-form99-list (loaded)="tableLoadedStates.form99.set(true)" />

<app-form-type-dialog [(dialogVisible)]="dialogVisible" />
