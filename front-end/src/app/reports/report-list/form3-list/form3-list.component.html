<app-shared-templates dataCyContext="report-list-form3" (reportNameClick)="this.editItem($event)" />
<div [hidden]="items().length === 0">
  <app-table
    [(first)]="first"
    dataCyContext="report-list-form3"
    [items]="items()"
    [(totalItems)]="totalItems"
    [loading]="loading()"
    [(rowsPerPage)]="rowsPerPage"
    [(selectedItems)]="selectedItems"
    itemName="reports"
    title="Form 3"
    [columns]="columns()"
    sortField="coverage_through_date"
    sortOrder="desc"
  />
</div>
