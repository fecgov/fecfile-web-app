<app-shared-templates dataCyContext="report-list-form99" (reportNameClick)="this.editItem($event)" />
<div [hidden]="items().length === 0">
  <app-table
    [(first)]="first"
    dataCyContext="report-list-form99"
    [items]="items()"
    [(totalItems)]="totalItems"
    [loading]="loading()"
    [(rowsPerPage)]="rowsPerPage"
    [(selectedItems)]="selectedItems"
    itemName="reports"
    title="Form 99"
    [columns]="columns()"
    sortField="report_status"
  />
</div>
