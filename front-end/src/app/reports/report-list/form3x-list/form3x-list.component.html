<app-shared-templates
  data-cy="report-list-form3x-shared-templates"
  dataCyContext="report-list-form3x"
  (reportNameClick)="this.editItem($event)"
/>
<div [hidden]="items().length === 0" data-cy="report-list-form3x-panel">
  <app-table
    data-cy="report-list-form3x-table"
    [(first)]="first"
    dataCyContext="report-list-form3x"
    [items]="items()"
    [(totalItems)]="totalItems"
    [loading]="loading()"
    [(rowsPerPage)]="rowsPerPage"
    [(selectedItems)]="selectedItems"
    itemName="reports"
    title="Form 3X"
    [columns]="columns()"
    sortField="coverage_through_date"
    sortOrder="desc"
  />
</div>
