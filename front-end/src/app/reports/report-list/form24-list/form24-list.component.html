<app-shared-templates dataCyContext="report-list-form24" (reportNameClick)="this.editItem($event)" />
<div [hidden]="items().length === 0">
  <app-table
    [(first)]="first"
    dataCyContext="report-list-form24"
    [items]="items()"
    [(totalItems)]="totalItems"
    [loading]="loading()"
    [(rowsPerPage)]="rowsPerPage"
    [(selectedItems)]="selectedItems"
    itemName="reports"
    title="Form 24"
    [columns]="columns()"
    sortField="report_status"
  />
</div>

<app-rename-f24-dialog [(dialogVisible)]="renameF24DialogVisible" [f24Report]="this.form24ToUpdate" />
