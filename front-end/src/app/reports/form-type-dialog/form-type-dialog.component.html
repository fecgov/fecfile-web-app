<app-dialog
  aria-labelledby="dialog-title"
  dataCyContext="report-list"
  data-cy="report-list-form-type-dialog"
  title="Create a new report"
  submitLabel="Start building report"
  [(visible)]="dialogVisible"
  (confirm)="goToReportForm()"
  [submitDisabled]="isSubmitDisabled()"
>
  <div class="dialog-body" data-cy="report-list-form-type-dialog-body">
    <div class="dropdown" data-cy="report-list-form-type-dialog-form-type-field">
      <span class="dialog-label" id="type-label">FORM TYPE</span>
      <p-select
        aria-labelledby="type-label"
        [options]="formTypeOptions"
        [(ngModel)]="selectedType"
        class="w-full"
        id="typeDropdown"
        [pt]="formTypeSelectPt()"
        data-cy="report-list-form-type-dialog-form-type-select"
      >
        <ng-template #selectedItem let-selectedOption>
          <span class="option">
            <b>{{ this.formType()?.label }}:</b> {{ this.formType()?.description }}
          </span>
        </ng-template>
        <ng-template let-type #item>
          <span class="option" [attr.data-cy]="formTypeOptionDataCy(type)">
            <b>{{ getFormType(type)?.label }}:</b> {{ getFormType(type)?.description }}
          </span>
        </ng-template>
      </p-select>
    </div>
    <app-create-f24 [visible]="isF24()" data-cy="report-list-form-type-dialog-create-f24" />
  </div>
</app-dialog>
