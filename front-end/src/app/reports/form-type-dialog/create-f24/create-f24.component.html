<div [hidden]="!visible()">
  <div class="modal-item-margin field">
    <span class="dialog-label" for="form24Options">REPORT TYPE</span>
    <p-selectbutton
      inputId="form24Options"
      id="form24Options"
      data-cy="report-list-dialog-form24-type-select"
      [options]="form24Options"
      [(ngModel)]="selectedForm24Type"
      optionLabel="label"
      optionValue="value"
    />
  </div>

  <div class="w-full field">
    <span class="dialog-label" id="form24Name_label">REPORT NAME</span>
    <p-input-group>
      <div id="f24-input-container">
        @if (typeName()) {
          <span>{{ typeName() }}</span>
        }

        <input
          pInputText
          type="text"
          [(ngModel)]="form24Name"
          id="form24Name"
          aria-labelledby="form24Name_label"
          [class]="selectedForm24Type() ? 'pl-1' : ''"
          data-cy="report-list-dialog-form24-name-input"
        />
      </div>
    </p-input-group>

    @if (!isSubmitDisabled() && form24NameErrors()) {
      <small class="p-error" data-cy="report-list-dialog-form24-name-error">{{ form24NameErrors() }}</small>
    }
  </div>
</div>
