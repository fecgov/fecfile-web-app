<svg xmlns="http://www.w3.org/2000/svg" 
     viewBox="0 0 100 100" 
     width="100%" 
     height="100%" 
     preserveAspectRatio="xMidYMid meet">
  <style>
    .circle-part { fill: var(--icon-bg, currentColor); }
    .text-part { fill: var(--icon-symbol, #fff); }
  </style>
  <circle class="circle-part" cx="50" cy="50" r="50" />
  <text class="text-part" x="50%" y="50%" 
        text-anchor="middle" 
        dominant-baseline="central" 
        font-size="70" 
        font-family="serif" 
        font-weight="700">!</text>
</svg>
